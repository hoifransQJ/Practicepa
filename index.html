<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* 95% centered container */
.screen {
    width: 95%;
    height: 95vh;
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    position: absolute;
    overflow: hidden;
}

.hidden {
    display: none;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    margin: 10px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
}

.yes-btn {
    background-color: #4CAF50;
    color: white;
}

.no-btn {
    background-color: #f44336;
    color: white;
    position: absolute;
}

#lieText {
    font-size: 20px;
    margin-top: 15px;
    color: purple;
}

/* VIDEO FIX — shows full video without cropping */
.video-wrapper {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
    border-radius: 15px;
}

video {
    max-width: 100%;
    max-height: 100%;
}
</style>
</head>

<body>

<!-- Opening Screen -->
<div class="screen" id="startScreen">
    <button onclick="startQuestion()">Touch These</button>
</div>

<!-- Question Screen -->
<div class="screen hidden" id="questionScreen">
    <h1>Be honest… Are you the most beautiful in the world?</h1>
    <button class="yes-btn" onclick="playVideo()">Yes</button>
    <button class="no-btn" id="noButton">No</button>
    <p id="lieText" class="hidden">You are lying 😏</p>
</div>

<!-- Video Screen -->
<div class="screen hidden" id="videoScreen">
    <div class="video-wrapper">
        <video id="myVideo" playsinline>
            <source src="2026-03-01-081751726.mp4" type="video/mp4">
        </video>
    </div>
</div>

<script>
function startQuestion() {
    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("questionScreen").classList.remove("hidden");
}

function playVideo() {
    document.getElementById("questionScreen").classList.add("hidden");
    document.getElementById("videoScreen").classList.remove("hidden");

    const video = document.getElementById("myVideo");
    video.muted = true; 
    video.play().then(() => {
        video.muted = false;
    });
}

const noButton = document.getElementById("noButton");
const lieText = document.getElementById("lieText");
const questionScreen = document.getElementById("questionScreen");
const yesButton = document.querySelector(".yes-btn");
const questionText = questionScreen.querySelector("h1");

/* Move No button without overlapping question or Yes */
function moveButton() {
    const buttonWidth = noButton.offsetWidth;
    const buttonHeight = noButton.offsetHeight;

    const yesRect = yesButton.getBoundingClientRect();
    const questionRect = questionText.getBoundingClientRect();

    let x, y;
    let overlap;

    do {
        x = Math.random() * (window.innerWidth * 0.9 - buttonWidth);
        y = Math.random() * (window.innerHeight * 0.9 - buttonHeight);

        const noRect = {
            left: x,
            right: x + buttonWidth,
            top: y,
            bottom: y + buttonHeight
        };

        overlap = !(
            noRect.right < yesRect.left ||
            noRect.left > yesRect.right ||
            noRect.bottom < yesRect.top ||
            noRect.top > yesRect.bottom
        ) || !(
            noRect.right < questionRect.left ||
            noRect.left > questionRect.right ||
            noRect.bottom < questionRect.top ||
            noRect.top > questionRect.bottom
        );

    } while (overlap);

    noButton.style.left = x + "px";
    noButton.style.top = y + "px";
}

function dodgeAndFlash() {
    moveButton();
    lieText.classList.remove("hidden");

    setTimeout(() => {
        lieText.classList.add("hidden");
    }, 1000);
}

noButton.addEventListener("click", dodgeAndFlash);
noButton.addEventListener("mouseover", moveButton);
noButton.addEventListener("touchstart", moveButton);
</script>

</body>
</html>
