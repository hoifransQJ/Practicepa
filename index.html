<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beautiful Choice</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* 95% container */
.screen{
    width:95%;
    height:95vh;
    background:white;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    position:absolute;
    overflow:hidden;
    padding:20px;
    box-sizing:border-box;
}

.hidden{
    display:none;
}

h2{
    text-align:center;
    margin-bottom:40px;
}

/* Horizontal buttons */
.button-area{
    position:relative;
    width:100%;
    height:150px;
    display:flex;
    justify-content:center;
    align-items:center;
}

button{
    padding:12px 20px;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    min-width:150px;
}

.yes-btn{
    background:#4CAF50;
    color:white;
    position:relative;
    z-index:1;
}

.no-btn{
    background:#f44336;
    color:white;
    position:absolute;
}

#lieText{
    margin-top:20px;
    font-size:18px;
    color:purple;
}

/* Video fix */
.video-wrapper{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    border-radius:15px;
}

video{
    max-width:100%;
    max-height:100%;
}
</style>
</head>

<body>

<!-- Question Screen -->
<div class="screen" id="questionScreen">
    <h2>Who do you think is more beautiful?</h2>

    <div class="button-area" id="buttonArea">
        <button class="yes-btn" onclick="playVideo()">Ana de Armas</button>
        <button class="no-btn" id="noButton">Sydney Sweeney</button>
    </div>

    <p id="lieText" class="hidden">You are lying 😏</p>
</div>

<!-- Video Screen -->
<div class="screen hidden" id="videoScreen">
    <div class="video-wrapper">
        <video id="myVideo" playsinline>
            <source src="2026-03-01-081751726.mp4" type="video/mp4">
        </video>
    </div>
</div>

<script>
function playVideo(){
    document.getElementById("questionScreen").classList.add("hidden");
    document.getElementById("videoScreen").classList.remove("hidden");

    const video=document.getElementById("myVideo");
    video.muted=true;

    video.play().then(()=>{
        video.muted=false;
    });
}

const noButton=document.getElementById("noButton");
const lieText=document.getElementById("lieText");
const buttonArea=document.getElementById("buttonArea");

function moveButton(){
    const areaWidth=buttonArea.clientWidth;
    const areaHeight=buttonArea.clientHeight;

    const btnWidth=noButton.offsetWidth;
    const btnHeight=noButton.offsetHeight;

    const x=Math.random()*(areaWidth-btnWidth);
    const y=Math.random()*(areaHeight-btnHeight);

    noButton.style.left=x+"px";
    noButton.style.top=y+"px";
}

function dodgeAndFlash(){
    moveButton();
    lieText.classList.remove("hidden");

    setTimeout(()=>{
        lieText.classList.add("hidden");
    },1000);
}

noButton.addEventListener("click",dodgeAndFlash);
noButton.addEventListener("mouseover",moveButton);
noButton.addEventListener("touchstart",moveButton);
</script>

</body>
</html>
