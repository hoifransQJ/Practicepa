<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* 95% centered container */
.screen {
    width: 95%;
    height: 95vh;
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    position: absolute;
    overflow: hidden;
}

.hidden {
    display: none;
}

/* Vertical button layout */
.button-column {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 20px;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    width: 220px;
}

.yes-btn {
    background-color: #4CAF50;
    color: white;
}

.no-btn {
    background-color: #f44336;
    color: white;
}

/* VIDEO FIX — shows full video without cropping */
.video-wrapper {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
    border-radius: 15px;
}

video {
    max-width: 100%;
    max-height: 100%;
}
</style>
</head>

<body>

<!-- Opening Screen -->
<div class="screen" id="startScreen">
    <button onclick="startQuestion()">Touch These</button>
</div>

<!-- Question Screen -->
<div class="screen hidden" id="questionScreen">
    <h1>Who do you think is more beautiful?</h1>

    <div class="button-column">
        <button class="yes-btn" onclick="playVideo()">Ana de Armas</button>
        <button class="no-btn" onclick="playVideo()">Sydney Sweeney</button>
    </div>
</div>

<!-- Video Screen -->
<div class="screen hidden" id="videoScreen">
    <div class="video-wrapper">
        <video id="myVideo" playsinline>
            <source src="2026-03-01-081751726.mp4" type="video/mp4">
        </video>
    </div>
</div>

<script>
function startQuestion() {
    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("questionScreen").classList.remove("hidden");
}

function playVideo() {
    document.getElementById("questionScreen").classList.add("hidden");
    document.getElementById("videoScreen").classList.remove("hidden");

    const video = document.getElementById("myVideo");
    video.muted = true;

    video.play().then(() => {
        video.muted = false;
    });
}
</script>

</body>
</html>
