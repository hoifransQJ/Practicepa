<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
}

/* Main container */
.screen {
    width: 95%;
    min-height: 95vh;
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    margin: 20px 0;
    padding: 30px 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

.hidden {
    display: none;
}

h1 {
    font-size: 26px;
    margin-bottom: 30px;
}

/* Buttons vertical */
.button-column {
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 100%;
    max-width: 300px;
}

button {
    padding: 14px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.yes-btn {
    background-color: #4CAF50;
    color: white;
}

.no-btn {
    background-color: #f44336;
    color: white;
}

/* Video screen */
.video-wrapper {
    width: 100%;
    height: 60vh;
    background: black;
    border-radius: 15px;
    display: flex;
    justify-content: center;
    align-items: center;
}

video {
    max-width: 100%;
    max-height: 100%;
}
</style>
</head>

<body>

<div class="screen" id="questionScreen">
    <h1>Who do you think is more beautiful?</h1>

    <div class="button-column">
        <button class="yes-btn" onclick="playVideo()">Ana de Armas</button>
        <button class="no-btn" onclick="playVideo()">Sydney Sweeney</button>
    </div>
</div>

<div class="screen hidden" id="videoScreen">
    <div class="video-wrapper">
        <video id="myVideo" playsinline>
            <source src="2026-03-01-081751726.mp4" type="video/mp4">
        </video>
    </div>
</div>

<script>
function playVideo() {
    document.getElementById("questionScreen").classList.add("hidden");
    document.getElementById("videoScreen").classList.remove("hidden");

    const video = document.getElementById("myVideo");
    video.play();
}
</script>

</body>
</html>
